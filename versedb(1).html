<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VerseDB — Star Citizen Ship & Component Database</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@200;300;400;500;600&display=swap');

:root {
  --bg:        #070a0f;
  --bg2:       #0c1018;
  --bg3:       #111622;
  --border:    #1e2a3a;
  --border2:   #253040;
  --accent:    #00c8ff;
  --accent2:   #0090c8;
  --gold:      #f0a500;
  --green:     #00e676;
  --red:       #ff4444;
  --orange:    #ff8c00;
  --purple:    #b47aff;
  --text:      #c8d8e8;
  --text2:     #7a8fa8;
  --text3:     #4a5f72;
  --phys:      #4488ff;
  --enrg:      #00e676;
  --dist:      #ff8c00;
  --therm:     #ff4444;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Exo 2', sans-serif;
  font-size: 13px;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ─────────────────────────────────────────────── */
header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  height: 48px;
  display: flex;
  align-items: center;
  gap: 24px;
  flex-shrink: 0;
  position: relative;
}

header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.4;
}

.logo {
  font-family: 'Rajdhani', sans-serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--accent);
  text-transform: uppercase;
}

.logo span { color: var(--text2); font-weight: 300; }

.nav-tabs {
  display: flex;
  gap: 2px;
  margin-left: 8px;
}

.nav-tab {
  padding: 6px 18px;
  background: none;
  border: 1px solid transparent;
  color: var(--text2);
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
  clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
}

.nav-tab:hover { color: var(--text); border-color: var(--border2); }
.nav-tab.active {
  color: var(--accent);
  border-color: var(--accent2);
  background: rgba(0,200,255,0.06);
}

.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}

.data-status {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--text3);
  display: flex;
  align-items: center;
  gap: 8px;
}

.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text3);
}
.status-dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); }

.load-btn {
  padding: 6px 14px;
  background: rgba(0,200,255,0.08);
  border: 1px solid var(--accent2);
  color: var(--accent);
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
  clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
}
.load-btn:hover { background: rgba(0,200,255,0.15); }

/* ── MAIN LAYOUT ─────────────────────────────────────────── */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── SHIP SIDEBAR ─────────────────────────────────────────── */
.ship-sidebar {
  width: 220px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.sidebar-search {
  padding: 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.search-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 6px 10px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--accent2); }
.search-input::placeholder { color: var(--text3); }

.ship-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
}

.ship-list::-webkit-scrollbar { width: 4px; }
.ship-list::-webkit-scrollbar-track { background: transparent; }
.ship-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.ship-item {
  padding: 8px 12px;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: all 0.1s;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.ship-item:hover { background: rgba(255,255,255,0.03); }
.ship-item.active {
  background: rgba(0,200,255,0.06);
  border-left-color: var(--accent);
}

.ship-item-name {
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.2;
}
.ship-item.active .ship-item-name { color: var(--accent); }

.ship-item-mfr {
  font-size: 10px;
  color: var(--text3);
  font-family: 'Share Tech Mono', monospace;
}

.ship-size-badge {
  font-size: 9px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  color: var(--text3);
  background: var(--bg3);
  padding: 1px 5px;
  display: inline-block;
  letter-spacing: 1px;
}

/* ── CONTENT AREA ─────────────────────────────────────────── */
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.view { display: none; flex: 1; overflow: hidden; }
.view.active { display: flex; }

/* ── LOADOUT VIEW ─────────────────────────────────────────── */
#view-loadout {
  flex-direction: row;
}

.loadout-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 12px;
  gap: 12px;
}

.ship-header {
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 14px 18px;
  display: flex;
  align-items: flex-start;
  gap: 24px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}

.ship-header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), transparent);
}

.ship-title { flex: 1; }

.ship-name-big {
  font-family: 'Rajdhani', sans-serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 1px;
  line-height: 1;
}

.ship-mfr-big {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--accent2);
  margin-top: 3px;
  letter-spacing: 1px;
}

.ship-stats-row {
  display: flex;
  gap: 20px;
  margin-top: 10px;
  flex-wrap: wrap;
}

.stat-pill {
  display: flex;
  flex-direction: column;
  gap: 1px;
}

.stat-pill-label {
  font-size: 9px;
  color: var(--text3);
  font-family: 'Rajdhani', sans-serif;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.stat-pill-val {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  color: var(--text);
}

.hardpoints-scroll {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding-right: 4px;
}

.hardpoints-scroll::-webkit-scrollbar { width: 4px; }
.hardpoints-scroll::-webkit-scrollbar-thumb { background: var(--border2); }

.slot-group-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--text3);
  text-transform: uppercase;
  padding: 4px 0 2px;
  border-bottom: 1px solid var(--border);
  margin-top: 4px;
}

.hardpoint-slot {
  display: grid;
  grid-template-columns: 160px 1fr auto;
  align-items: center;
  gap: 10px;
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 8px 12px;
  transition: border-color 0.15s;
}
.hardpoint-slot:hover { border-color: var(--border2); }

.slot-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 6px;
}

.slot-size-tag {
  font-size: 9px;
  color: var(--text3);
  background: var(--bg3);
  padding: 1px 4px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
}

.slot-select {
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 5px 8px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  width: 100%;
  outline: none;
  cursor: pointer;
  transition: border-color 0.15s;
}
.slot-select:focus { border-color: var(--accent2); }
.slot-select option { background: var(--bg3); }

.slot-dps {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--text3);
  text-align: right;
  min-width: 70px;
}

/* ── DPS PANEL ─────────────────────────────────────────────── */
.dps-panel {
  width: 260px;
  background: var(--bg2);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 14px;
  gap: 12px;
  flex-shrink: 0;
  overflow-y: auto;
}

.panel-section-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--text3);
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
  margin-bottom: 6px;
}

.dps-total {
  text-align: center;
  padding: 10px;
  background: var(--bg3);
  border: 1px solid var(--border2);
}

.dps-total-num {
  font-family: 'Rajdhani', sans-serif;
  font-size: 36px;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
}

.dps-total-label {
  font-size: 10px;
  color: var(--text3);
  font-family: 'Share Tech Mono', monospace;
  letter-spacing: 1px;
  margin-top: 2px;
}

.dps-breakdown {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.dps-bar-row {
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.dps-bar-label {
  display: flex;
  justify-content: space-between;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
}

.dps-bar-track {
  height: 4px;
  background: var(--bg3);
  border-radius: 2px;
  overflow: hidden;
}

.dps-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.4s ease;
}

.weapon-breakdown {
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-height: 200px;
  overflow-y: auto;
}

.weapon-breakdown::-webkit-scrollbar { width: 3px; }
.weapon-breakdown::-webkit-scrollbar-thumb { background: var(--border2); }

.weapon-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 8px;
  background: var(--bg3);
  border-left: 2px solid var(--border2);
}

.weapon-row-name {
  font-size: 11px;
  color: var(--text2);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
}

.weapon-row-dps {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--text);
  margin-left: 8px;
  white-space: nowrap;
}

.power-meter {
  padding: 10px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.power-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
}

.power-label { color: var(--text2); }
.power-val { font-family: 'Share Tech Mono', monospace; }
.power-val.positive { color: var(--green); }
.power-val.negative { color: var(--red); }

/* ── FILTER VIEW ─────────────────────────────────────────── */
#view-filter {
  flex-direction: column;
  padding: 14px;
  gap: 12px;
}

.filter-bar {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 10px 14px;
  flex-shrink: 0;
}

.filter-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--text3);
  text-transform: uppercase;
  white-space: nowrap;
}

.filter-select, .filter-input {
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 5px 10px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  outline: none;
  cursor: pointer;
}
.filter-select:focus, .filter-input:focus { border-color: var(--accent2); }
.filter-input { width: 120px; }

.component-grid {
  flex: 1;
  overflow-y: auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 8px;
  align-content: start;
}

.component-grid::-webkit-scrollbar { width: 4px; }
.component-grid::-webkit-scrollbar-thumb { background: var(--border2); }

.comp-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 12px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}

.comp-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 2px; height: 100%;
  background: var(--border2);
  transition: background 0.15s;
}

.comp-card:hover { border-color: var(--border2); }
.comp-card:hover::before { background: var(--accent); }

.comp-card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 8px;
}

.comp-card-name {
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.2;
}

.comp-card-mfr {
  font-size: 10px;
  color: var(--text3);
  font-family: 'Share Tech Mono', monospace;
  margin-top: 1px;
}

.comp-type-badge {
  font-family: 'Rajdhani', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 2px 7px;
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text3);
  white-space: nowrap;
}

.comp-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 6px;
}

.comp-stat {
  display: flex;
  flex-direction: column;
  gap: 1px;
  min-width: 60px;
}

.comp-stat-label {
  font-size: 9px;
  color: var(--text3);
  font-family: 'Rajdhani', sans-serif;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.comp-stat-val {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  color: var(--text);
}

.comp-stat-val.accent { color: var(--accent); }
.comp-stat-val.gold { color: var(--gold); }
.comp-stat-val.green { color: var(--green); }

.damage-dots {
  display: flex;
  gap: 3px;
  align-items: center;
  margin-top: 4px;
}
.dmg-dot {
  width: 8px; height: 8px;
  border-radius: 1px;
}

/* ── COMPARE VIEW ─────────────────────────────────────────── */
#view-compare {
  flex-direction: column;
  padding: 14px;
  gap: 12px;
}

.compare-selectors {
  display: flex;
  gap: 10px;
  flex-shrink: 0;
  flex-wrap: wrap;
}

.compare-slot-select {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 12px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  flex: 1;
  min-width: 180px;
  max-width: 260px;
  outline: none;
  cursor: pointer;
}
.compare-slot-select:focus { border-color: var(--accent2); }

.compare-table-wrap {
  flex: 1;
  overflow: auto;
}

.compare-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

.compare-table th {
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 10px 14px;
  text-align: left;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 1px;
  color: var(--text);
  position: sticky;
  top: 0;
  z-index: 2;
}

.compare-table th.item-col {
  color: var(--accent);
  background: rgba(0,200,255,0.05);
  border-top: 2px solid var(--accent2);
}

.compare-table td {
  border: 1px solid var(--border);
  padding: 7px 14px;
  color: var(--text2);
}

.compare-table tr:hover td { background: rgba(255,255,255,0.02); }

.compare-table td.row-label {
  background: var(--bg2);
  color: var(--text3);
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  white-space: nowrap;
}

.compare-table td.best {
  color: var(--green);
  font-family: 'Share Tech Mono', monospace;
  font-weight: 600;
}

.compare-table td.val {
  font-family: 'Share Tech Mono', monospace;
}

/* ── EMPTY STATE ─────────────────────────────────────────── */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--text3);
}

.empty-icon {
  font-size: 48px;
  opacity: 0.3;
}

.empty-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.empty-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--text3);
}

/* ── SCROLLBARS ──────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); }

/* ── NO DATA OVERLAY ─────────────────────────────────────── */
#no-data-overlay {
  position: fixed;
  inset: 0;
  background: rgba(7,10,15,0.92);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  z-index: 100;
}

.overlay-logo {
  font-family: 'Rajdhani', sans-serif;
  font-size: 48px;
  font-weight: 700;
  letter-spacing: 8px;
  color: var(--accent);
  text-transform: uppercase;
}

.overlay-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  color: var(--text3);
  letter-spacing: 2px;
}

.overlay-btn {
  margin-top: 8px;
  padding: 12px 32px;
  background: rgba(0,200,255,0.1);
  border: 1px solid var(--accent2);
  color: var(--accent);
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
}
.overlay-btn:hover {
  background: rgba(0,200,255,0.2);
  box-shadow: 0 0 20px rgba(0,200,255,0.2);
}

.overlay-hint {
  font-size: 11px;
  color: var(--text3);
  font-family: 'Share Tech Mono', monospace;
}

input[type="file"] { display: none; }

/* ── SECTION COUNTS ──────────────────────────────────────── */
.count-badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  background: var(--bg3);
  padding: 1px 6px;
  border-radius: 10px;
  margin-left: 4px;
}
</style>
</head>
<body>

<div id="no-data-overlay">
  <div class="overlay-logo">VerseDB</div>
  <div class="overlay-sub">STAR CITIZEN · SHIP &amp; COMPONENT DATABASE</div>
  <label class="overlay-btn" for="file-input">Load Data File</label>
  <input type="file" id="file-input" accept=".json">
  <div class="overlay-hint">Select versedb_data.json to begin</div>
</div>

<header>
  <div class="logo">Verse<span>DB</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchTab('loadout')">Loadout</button>
    <button class="nav-tab" onclick="switchTab('filter')">Components</button>
    <button class="nav-tab" onclick="switchTab('compare')">Compare</button>
  </div>
  <div class="header-right">
    <div class="data-status">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">NO DATA</span>
    </div>
    <label class="load-btn" for="file-input">↑ Load JSON</label>
  </div>
</header>

<div class="main">

  <!-- Ship Sidebar -->
  <div class="ship-sidebar" id="ship-sidebar" style="display:none">
    <div class="sidebar-search">
      <input class="search-input" type="text" placeholder="Search ships..." id="ship-search" oninput="filterShips()">
    </div>
    <div class="ship-list" id="ship-list"></div>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- LOADOUT VIEW -->
    <div class="view active" id="view-loadout">
      <div id="loadout-empty" class="empty-state" style="flex:1">
        <div class="empty-icon">⬡</div>
        <div class="empty-title">Select a Ship</div>
        <div class="empty-sub">Choose a ship from the sidebar to build a loadout</div>
      </div>
      <div id="loadout-builder" style="display:none;flex:1;overflow:hidden;display:none">
        <div class="loadout-main">
          <div class="ship-header" id="ship-header"></div>
          <div class="hardpoints-scroll" id="hardpoints-container"></div>
        </div>
        <div class="dps-panel" id="dps-panel"></div>
      </div>
    </div>

    <!-- FILTER / COMPONENTS VIEW -->
    <div class="view" id="view-filter">
      <div class="filter-bar">
        <span class="filter-label">Type</span>
        <select class="filter-select" id="filter-type" onchange="applyFilters()">
          <option value="">All</option>
          <option value="WeaponGun">Weapons</option>
          <option value="Shield">Shields</option>
          <option value="PowerPlant">Power Plants</option>
          <option value="Cooler">Coolers</option>
          <option value="QuantumDrive">Quantum Drives</option>
        </select>
        <span class="filter-label">Size</span>
        <select class="filter-select" id="filter-size" onchange="applyFilters()">
          <option value="">All</option>
          <option value="1">S1</option>
          <option value="2">S2</option>
          <option value="3">S3</option>
          <option value="4">S4</option>
          <option value="5">S5</option>
          <option value="6">S6</option>
        </select>
        <span class="filter-label">Search</span>
        <input class="filter-input" type="text" id="filter-search" placeholder="name..." oninput="applyFilters()">
        <span id="filter-count" class="count-badge"></span>
      </div>
      <div class="component-grid" id="component-grid"></div>
    </div>

    <!-- COMPARE VIEW -->
    <div class="view" id="view-compare">
      <div class="compare-selectors" id="compare-selectors"></div>
      <div class="compare-table-wrap">
        <table class="compare-table" id="compare-table"></table>
      </div>
    </div>

  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────
let DB = null;
let selectedShip = null;
let loadout = {};   // slotId -> item
let compareItems = [null, null, null, null];

// ── File loading ─────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      DB = JSON.parse(ev.target.result);
      initApp();
    } catch(err) {
      alert('Invalid JSON file: ' + err.message);
    }
  };
  reader.readAsText(file);
});

function initApp() {
  document.getElementById('no-data-overlay').style.display = 'none';
  document.getElementById('ship-sidebar').style.display = 'flex';

  const dot = document.getElementById('status-dot');
  dot.classList.add('live');
  document.getElementById('status-text').textContent =
    `${DB.meta.shipCount} SHIPS · ${DB.meta.itemCount} ITEMS`;

  buildShipList();
  applyFilters();
  buildCompareSelectors();
}

// ── Tab switching ────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.nav-tab').forEach((t,i) => {
    t.classList.toggle('active', ['loadout','filter','compare'][i] === tab);
  });
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  if (tab === 'compare') renderCompare();
}

// ── Ship sidebar ─────────────────────────────────────────────
function buildShipList() {
  renderShipList(DB.ships);
}

function filterShips() {
  const q = document.getElementById('ship-search').value.toLowerCase();
  const filtered = DB.ships.filter(s =>
    s.name.toLowerCase().includes(q) || s.manufacturer.toLowerCase().includes(q)
  );
  renderShipList(filtered);
}

function renderShipList(ships) {
  const el = document.getElementById('ship-list');
  const sorted = [...ships].sort((a,b) => a.name.localeCompare(b.name));
  el.innerHTML = sorted.map(s => `
    <div class="ship-item ${selectedShip?.className === s.className ? 'active' : ''}"
         onclick="selectShip('${s.className}')">
      <div class="ship-item-name">${s.name}</div>
      <div class="ship-item-mfr">${s.manufacturer}</div>
    </div>
  `).join('');
}

function selectShip(className) {
  selectedShip = DB.ships.find(s => s.className === className);
  loadout = {};

  // Pre-populate with default loadout
  if (selectedShip?.defaultLoadout) {
    const dl = selectedShip.defaultLoadout;
    selectedShip.hardpoints.forEach(hp => {
      const portKey = hp.id.toLowerCase();
      const defaultCls = dl[portKey];
      if (!defaultCls) return;
      // Find the item by className (case-insensitive)
      const item = DB.items.find(i => i.className.toLowerCase() === defaultCls.toLowerCase());
      if (item) {
        loadout[hp.id] = item;
      }
    });
  }

  document.querySelectorAll('.ship-item').forEach(el => {
    el.classList.toggle('active', el.querySelector('.ship-item-name')?.textContent === selectedShip.name);
  });
  renderLoadout();
}

// ── Loadout builder ───────────────────────────────────────────
function renderLoadout() {
  if (!selectedShip) return;

  document.getElementById('loadout-empty').style.display = 'none';
  const builder = document.getElementById('loadout-builder');
  builder.style.display = 'flex';
  builder.style.flex = '1';

  // Ship header
  const sh = selectedShip;
  document.getElementById('ship-header').innerHTML = `
    <div class="ship-title">
      <div class="ship-name-big">${sh.name}</div>
      <div class="ship-mfr-big">${sh.manufacturer}</div>
      <div class="ship-stats-row">
        <div class="stat-pill">
          <span class="stat-pill-label">Role</span>
          <span class="stat-pill-val">${sh.role || '—'}</span>
        </div>
        <div class="stat-pill">
          <span class="stat-pill-label">Career</span>
          <span class="stat-pill-val">${sh.career || '—'}</span>
        </div>
        <div class="stat-pill">
          <span class="stat-pill-label">Crew</span>
          <span class="stat-pill-val">${sh.crew}</span>
        </div>
        <div class="stat-pill">
          <span class="stat-pill-label">Mass</span>
          <span class="stat-pill-val">${sh.mass ? (sh.mass/1000).toFixed(0)+'t' : '—'}</span>
        </div>
        <div class="stat-pill">
          <span class="stat-pill-label">Size</span>
          <span class="stat-pill-val">${sh.size?.toUpperCase() || '—'}</span>
        </div>
      </div>
    </div>
  `;

  // Hardpoints grouped by type
  const weaponTypes = ['WeaponGun','WeaponTachyon'];
  const utilityTypes = ['Shield','PowerPlant','Cooler','QuantumDrive'];

  const weapons = sh.hardpoints.filter(hp =>
    hp.type === 'WeaponGun' || hp.type === 'Turret' ||
    hp.type === 'MissileLauncher' || hp.type === 'BombLauncher' ||
    hp.allTypes?.some(t => t.type === 'WeaponGun')
  );
  const utilities = sh.hardpoints.filter(hp =>
    utilityTypes.includes(hp.type)
  );
  const other = sh.hardpoints.filter(hp =>
    !weapons.includes(hp) && !utilities.includes(hp) &&
    !['Radar','Sensor','QuantumFuelTank'].includes(hp.type) &&
    hp.flags !== 'invisible'
  );

  const container = document.getElementById('hardpoints-container');
  container.innerHTML = '';

  if (weapons.length) {
    addSlotGroup(container, 'Weapons', weapons);
  }
  if (utilities.length) {
    addSlotGroup(container, 'Systems', utilities);
  }
  if (other.length) {
    addSlotGroup(container, 'Other', other);
  }

  updateDPS();
}

function addSlotGroup(container, label, slots) {
  const grpLabel = document.createElement('div');
  grpLabel.className = 'slot-group-label';
  grpLabel.textContent = label;
  container.appendChild(grpLabel);

  slots.forEach(hp => {
    const div = document.createElement('div');
    div.className = 'hardpoint-slot';

    const isLocked = hp.flags?.includes('uneditable') || hp.flags?.includes('$uneditable');
    const itemType = getSlotItemType(hp);

    if (isLocked) {
      // Fixed/bespoke equipment — show as read-only row
      div.innerHTML = `
        <div class="slot-label">
          <span class="slot-size-tag">S${hp.maxSize}</span>
          ${hp.label}
        </div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text3);
                    padding:5px 8px;background:var(--bg3);border:1px solid var(--border);
                    flex:1;display:flex;align-items:center;gap:8px">
          <span style="color:var(--text3);font-size:9px;letter-spacing:1px;
                       font-family:'Rajdhani',sans-serif;font-weight:700">FIXED</span>
          <span style="color:var(--text2)">${hp.type.replace('Launcher','').replace('Gun','').trim()} · Size ${hp.maxSize}</span>
        </div>
        <div class="slot-dps" style="color:var(--text3)">—</div>
      `;
      container.appendChild(div);
      return;
    }

    const options = getOptionsForSlot(hp, itemType);
    const currentItem = loadout[hp.id];

    const dpsStr = currentItem?.dps > 0 ? `${currentItem.dps.toFixed(0)} DPS` :
                   currentItem?.hp > 0 ? `${currentItem.hp.toFixed(0)} HP` :
                   currentItem?.powerOutput > 0 ? `${currentItem.powerOutput} PWR` :
                   currentItem?.coolingRate > 0 ? `${currentItem.coolingRate.toFixed(0)} COOL` :
                   currentItem?.speed > 0 ? `${(currentItem.speed/1e6).toFixed(0)}Mm/s` : '';

    const optionCount = options.length;
    div.innerHTML = `
      <div class="slot-label">
        <span class="slot-size-tag">S${hp.maxSize}</span>
        ${hp.label}
      </div>
      <select class="slot-select" onchange="setLoadoutItem('${hp.id}', this.value)">
        <option value="">— Empty — (${optionCount} available)</option>
        ${options.map(opt =>
          `<option value="${opt.className}" ${currentItem?.className === opt.className ? 'selected' : ''}>
            S${opt.size} ${opt.name}
          </option>`
        ).join('')}
      </select>
      <div class="slot-dps" id="slot-dps-${hp.id.replace(/[^a-z0-9]/gi,'_')}">${dpsStr}</div>
    `;
    container.appendChild(div);
  });
}

function getSlotItemType(hp) {
  if (hp.type === 'WeaponGun' || hp.type === 'Turret' ||
      hp.allTypes?.some(t => t.type === 'WeaponGun')) return 'WeaponGun';
  return hp.type;
}

function getOptionsForSlot(hp, itemType) {
  const maxSize = hp.maxSize;
  const minSize = hp.minSize || 1;

  let typeFilter;
  if (itemType === 'WeaponGun') {
    typeFilter = i => (i.type === 'WeaponGun' || i.type === 'WeaponTachyon') &&
                      i.size >= minSize && i.size <= maxSize;
  } else {
    // All component types now have a size field
    typeFilter = i => i.type === itemType &&
                      (i.size == null || (i.size >= minSize && i.size <= maxSize));
  }

  return (DB?.items || [])
    .filter(typeFilter)
    .sort((a,b) => {
      if (b.dps !== a.dps) return (b.dps||0) - (a.dps||0);
      if (b.hp !== a.hp) return (b.hp||0) - (a.hp||0);
      if (b.powerOutput !== a.powerOutput) return (b.powerOutput||0) - (a.powerOutput||0);
      if (b.coolingRate !== a.coolingRate) return (b.coolingRate||0) - (a.coolingRate||0);
      if (b.speed !== a.speed) return (b.speed||0) - (a.speed||0);
      return a.name.localeCompare(b.name);
    });
}

function setLoadoutItem(slotId, className) {
  if (className) {
    loadout[slotId] = DB.items.find(i => i.className === className);
  } else {
    delete loadout[slotId];
  }
  updateDPS();
}

function updateDPS() {
  const panel = document.getElementById('dps-panel');
  if (!panel) return;

  const weapons = Object.values(loadout).filter(i => i?.type === 'WeaponGun' || i?.type === 'WeaponTachyon');
  const shields = Object.values(loadout).filter(i => i?.type === 'Shield');
  const pps     = Object.values(loadout).filter(i => i?.type === 'PowerPlant');
  const coolers = Object.values(loadout).filter(i => i?.type === 'Cooler');

  const totalDPS   = weapons.reduce((s,w) => s + (w?.dps||0), 0);
  const physDPS    = weapons.reduce((s,w) => s + ((w?.damage?.physical||0) * (w?.fireRate||0) / 60), 0);
  const enrgDPS    = weapons.reduce((s,w) => s + ((w?.damage?.energy||0) * (w?.fireRate||0) / 60), 0);
  const distDPS    = weapons.reduce((s,w) => s + ((w?.damage?.distortion||0) * (w?.fireRate||0) / 60), 0);
  const maxDPS     = Math.max(physDPS, enrgDPS, distDPS, 0.001);
  const totalAlpha = weapons.reduce((s,w) => s + (w?.alphaDamage||0), 0);
  const physAlpha  = weapons.reduce((s,w) => s + (w?.damage?.physical||0), 0);
  const enrgAlpha  = weapons.reduce((s,w) => s + (w?.damage?.energy||0), 0);
  const distAlpha  = weapons.reduce((s,w) => s + (w?.damage?.distortion||0), 0);

  const totalHP   = shields.reduce((s,sh) => s + (sh?.hp||0), 0);
  const ppOutput  = pps.reduce((s,p) => s + (p?.powerOutput||0), 0);
  const totalDraw = weapons.reduce((s,w) => s + (w?.powerDraw||0), 0);
  const coolRate  = coolers.reduce((s,c) => s + (c?.coolingRate||0), 0);

  const powerBalance = ppOutput - totalDraw;

  // Update individual slot DPS labels
  if (selectedShip) {
    selectedShip.hardpoints.forEach(hp => {
      const item = loadout[hp.id];
      const el = document.getElementById('slot-dps-' + hp.id.replace(/[^a-z0-9]/gi,'_'));
      if (!el) return;
      el.textContent = item?.dps > 0 ? `${item.dps.toFixed(0)} DPS` :
                       item?.hp > 0 ? `${item.hp.toFixed(0)} HP` :
                       item?.powerOutput > 0 ? `${item.powerOutput} PWR` :
                       item?.coolingRate > 0 ? `${item.coolingRate.toFixed(0)} COOL` :
                       item?.speed > 0 ? `${(item.speed/1e6).toFixed(0)}Mm/s` : '';
    });
  }

  panel.innerHTML = `
    <div>
      <div class="panel-section-title">DPS Output</div>
      <div class="dps-total" style="display:flex;justify-content:space-around;align-items:center;gap:8px">
        <div style="text-align:center">
          <div class="dps-total-num">${totalDPS.toFixed(0)}</div>
          <div class="dps-total-label">BURST DPS</div>
        </div>
        ${totalAlpha > 0 ? `
        <div style="width:1px;background:var(--border);align-self:stretch"></div>
        <div style="text-align:center">
          <div class="dps-total-num" style="font-size:28px;color:var(--text2)">${totalAlpha.toFixed(0)}</div>
          <div class="dps-total-label">ALPHA</div>
        </div>` : ''}
      </div>
    </div>

    <div class="dps-breakdown">
      ${physDPS > 0 ? `
      <div class="dps-bar-row">
        <div class="dps-bar-label">
          <span style="color:var(--phys)">Physical</span>
          <span style="font-family:'Share Tech Mono',monospace;font-size:11px">
            <span style="color:var(--phys)">${physDPS.toFixed(0)}</span>
            ${physAlpha > 0 ? `<span style="color:var(--text3);font-size:10px"> / ${physAlpha.toFixed(0)}α</span>` : ''}
          </span>
        </div>
        <div class="dps-bar-track">
          <div class="dps-bar-fill" style="width:${(physDPS/maxDPS*100).toFixed(1)}%;background:var(--phys)"></div>
        </div>
      </div>` : ''}
      ${enrgDPS > 0 ? `
      <div class="dps-bar-row">
        <div class="dps-bar-label">
          <span style="color:var(--enrg)">Energy</span>
          <span style="font-family:'Share Tech Mono',monospace;font-size:11px">
            <span style="color:var(--enrg)">${enrgDPS.toFixed(0)}</span>
            ${enrgAlpha > 0 ? `<span style="color:var(--text3);font-size:10px"> / ${enrgAlpha.toFixed(0)}α</span>` : ''}
          </span>
        </div>
        <div class="dps-bar-track">
          <div class="dps-bar-fill" style="width:${(enrgDPS/maxDPS*100).toFixed(1)}%;background:var(--enrg)"></div>
        </div>
      </div>` : ''}
      ${distDPS > 0 ? `
      <div class="dps-bar-row">
        <div class="dps-bar-label">
          <span style="color:var(--dist)">Distortion</span>
          <span style="font-family:'Share Tech Mono',monospace;font-size:11px">
            <span style="color:var(--dist)">${distDPS.toFixed(0)}</span>
            ${distAlpha > 0 ? `<span style="color:var(--text3);font-size:10px"> / ${distAlpha.toFixed(0)}α</span>` : ''}
          </span>
        </div>
        <div class="dps-bar-track">
          <div class="dps-bar-fill" style="width:${(distDPS/maxDPS*100).toFixed(1)}%;background:var(--dist)"></div>
        </div>
      </div>` : ''}
      ${totalDPS === 0 ? '<div style="color:var(--text3);font-size:11px;text-align:center;padding:8px">No weapons equipped</div>' : ''}
    </div>

    ${weapons.length > 0 ? `
    <div>
      <div class="panel-section-title">Weapons</div>
      <div class="weapon-breakdown">
        ${weapons.map(w => `
          <div class="weapon-row">
            <div class="weapon-row-name">${w.name}</div>
            <div class="weapon-row-dps">
              ${w.dps > 0 ? `${w.dps.toFixed(0)} dps` : w.fireRate > 0 ? `${w.fireRate}rpm` : '—'}
              ${w.alphaDamage > 0 ? `<span style="color:var(--text3);font-size:10px"> / ${w.alphaDamage.toFixed(0)}α</span>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
    </div>` : ''}

    ${totalHP > 0 ? `
    <div>
      <div class="panel-section-title">Shield</div>
      <div class="power-meter">
        <div class="power-row">
          <span class="power-label">Total HP</span>
          <span class="power-val">${totalHP.toFixed(0)}</span>
        </div>
        ${shields[0]?.regenRate > 0 ? `
        <div class="power-row">
          <span class="power-label">Regen</span>
          <span class="power-val">${shields[0].regenRate.toFixed(0)}/s</span>
        </div>` : ''}
      </div>
    </div>` : ''}

    ${ppOutput > 0 || totalDraw > 0 ? `
    <div>
      <div class="panel-section-title">Power</div>
      <div class="power-meter">
        ${ppOutput > 0 ? `
        <div class="power-row">
          <span class="power-label">Output</span>
          <span class="power-val">${ppOutput} seg</span>
        </div>` : ''}
        ${totalDraw > 0 ? `
        <div class="power-row">
          <span class="power-label">Weapon Draw</span>
          <span class="power-val">${totalDraw.toFixed(2)}</span>
        </div>` : ''}
        ${coolers.length > 0 && coolRate > 0 ? `
        <div class="power-row">
          <span class="power-label">Cooling</span>
          <span class="power-val">${coolRate.toFixed(0)} cool</span>
        </div>` : ''}
      </div>
    </div>` : ''}
  `;
}

// ── Component Filter / Cards ──────────────────────────────────
function applyFilters() {
  if (!DB) return;
  const type   = document.getElementById('filter-type')?.value || '';
  const size   = document.getElementById('filter-size')?.value || '';
  const search = document.getElementById('filter-search')?.value.toLowerCase() || '';

  let filtered = DB.items.filter(i => {
    if (type && i.type !== type) return false;
    if (size && String(i.size) !== size) return false;
    if (search && !i.name.toLowerCase().includes(search) &&
        !i.manufacturer?.toLowerCase().includes(search)) return false;
    // Only show items with meaningful stats
    if (i.type === 'WeaponGun' && !type && i.alphaDamage === 0) return false;
    return true;
  });

  document.getElementById('filter-count').textContent = filtered.length;

  const grid = document.getElementById('component-grid');
  grid.innerHTML = filtered.slice(0, 200).map(item => renderCompCard(item)).join('');
}

function renderCompCard(item) {
  let stats = '';
  const t = item.type;

  if (t === 'WeaponGun' || t === 'WeaponTachyon') {
    const dmg = item.damage || {};
    const dmgType = Object.entries(dmg).find(([k,v]) => v > 0);
    const color = dmgType ? ({physical:'var(--phys)',energy:'var(--enrg)',distortion:'var(--dist)',thermal:'var(--therm)'}[dmgType[0]] || 'var(--text)') : 'var(--text)';
    stats = `
      <div class="comp-stat">
        <span class="comp-stat-label">DPS</span>
        <span class="comp-stat-val accent">${item.dps > 0 ? item.dps.toFixed(1) : '—'}</span>
      </div>
      <div class="comp-stat">
        <span class="comp-stat-label">Alpha</span>
        <span class="comp-stat-val" style="color:${color}">${item.alphaDamage > 0 ? item.alphaDamage.toFixed(1) : '—'}</span>
      </div>
      <div class="comp-stat">
        <span class="comp-stat-label">RPM</span>
        <span class="comp-stat-val">${item.fireRate > 0 ? item.fireRate.toFixed(0) : '—'}</span>
      </div>
      <div class="comp-stat">
        <span class="comp-stat-label">Range</span>
        <span class="comp-stat-val">${item.range > 0 ? (item.range/1000).toFixed(1)+'km' : '—'}</span>
      </div>
    `;
  } else if (t === 'Shield') {
    stats = `
      <div class="comp-stat">
        <span class="comp-stat-label">HP</span>
        <span class="comp-stat-val accent">${item.hp > 0 ? item.hp.toFixed(0) : '—'}</span>
      </div>
      <div class="comp-stat">
        <span class="comp-stat-label">Regen</span>
        <span class="comp-stat-val">${item.regenRate > 0 ? item.regenRate.toFixed(0)+'/s' : '—'}</span>
      </div>
      <div class="comp-stat">
        <span class="comp-stat-label">Downed</span>
        <span class="comp-stat-val">${item.downedRegenDelay > 0 ? item.downedRegenDelay.toFixed(1)+'s' : '—'}</span>
      </div>
    `;
  } else if (t === 'PowerPlant') {
    stats = `
      <div class="comp-stat">
        <span class="comp-stat-label">Output</span>
        <span class="comp-stat-val green">${item.powerOutput > 0 ? item.powerOutput+' seg' : '—'}</span>
      </div>
      <div class="comp-stat">
        <span class="comp-stat-label">EM Sig</span>
        <span class="comp-stat-val">${item.emSignature > 0 ? item.emSignature.toFixed(0) : '—'}</span>
      </div>
    `;
  } else if (t === 'Cooler') {
    stats = `
      <div class="comp-stat">
        <span class="comp-stat-label">Cooling</span>
        <span class="comp-stat-val green">${item.coolingRate > 0 ? item.coolingRate.toFixed(0) : '—'}</span>
      </div>
      <div class="comp-stat">
        <span class="comp-stat-label">IR Sig</span>
        <span class="comp-stat-val">${item.irSignature > 0 ? item.irSignature.toFixed(0) : '—'}</span>
      </div>
    `;
  } else if (t === 'QuantumDrive') {
    const spd = item.speed > 0 ? (item.speed/1e6).toFixed(0) + ' Mm/s' : '—';
    stats = `
      <div class="comp-stat">
        <span class="comp-stat-label">Speed</span>
        <span class="comp-stat-val accent">${spd}</span>
      </div>
      <div class="comp-stat">
        <span class="comp-stat-label">Cal Time</span>
        <span class="comp-stat-val">${item.calTime > 0 ? item.calTime.toFixed(1)+'s' : '—'}</span>
      </div>
    `;
  }

  const typeLabel = {
    'WeaponGun':'WEAPON','WeaponTachyon':'TACHYON','WeaponMining':'MINING',
    'Shield':'SHIELD','PowerPlant':'POWER','Cooler':'COOLER','QuantumDrive':'Q-DRIVE'
  }[item.type] || item.type;

  return `
    <div class="comp-card">
      <div class="comp-card-header">
        <div>
          <div class="comp-card-name">${item.name}</div>
          <div class="comp-card-mfr">${item.manufacturer || '—'} &middot; S${item.size || '?'}</div>
        </div>
        <div class="comp-type-badge">${typeLabel}</div>
      </div>
      <div class="comp-stats">${stats}</div>
    </div>
  `;
}

// ── Compare ───────────────────────────────────────────────────
function buildCompareSelectors() {
  const container = document.getElementById('compare-selectors');
  if (!DB) return;

  // Default to weapons for compare
  const allItems = DB.items.filter(i => i.type === 'WeaponGun' && i.dps > 0)
    .sort((a,b) => b.dps - a.dps);

  container.innerHTML = [0,1,2,3].map(i => `
    <select class="compare-slot-select" onchange="setCompareItem(${i}, this.value)">
      <option value="">— Select component —</option>
      ${allItems.map(item =>
        `<option value="${item.className}">${item.name} (S${item.size})</option>`
      ).join('')}
    </select>
  `).join('');

  // Pre-select top 4
  allItems.slice(0,4).forEach((item,i) => {
    compareItems[i] = item;
    container.querySelectorAll('select')[i].value = item.className;
  });
  renderCompare();
}

function setCompareItem(index, className) {
  compareItems[index] = className ? DB.items.find(i => i.className === className) : null;
  renderCompare();
}

function renderCompare() {
  const items = compareItems.filter(Boolean);
  if (!items.length) return;

  const rows = [];
  const allItems = compareItems;

  // Determine what type of items we're comparing
  const types = new Set(items.map(i => i.type));
  const primaryType = [...types][0];

  const commonRows = [
    ['Name', i => i.name],
    ['Manufacturer', i => i.manufacturer || '—'],
    ['Size', i => `S${i.size || '?'}`],
    ['Grade', i => i.grade || '—'],
  ];

  const typeRows = {
    'WeaponGun': [
      ['DPS', i => i.dps > 0 ? i.dps.toFixed(1) : '—', true, v => parseFloat(v)||0, true],
      ['Alpha Damage', i => i.alphaDamage > 0 ? i.alphaDamage.toFixed(2) : '—', false, v => parseFloat(v)||0, true],
      ['Fire Rate', i => i.fireRate > 0 ? i.fireRate.toFixed(0)+' rpm' : '—', false],
      ['Physical', i => i.damage?.physical > 0 ? i.damage.physical.toFixed(2) : '—', false],
      ['Energy', i => i.damage?.energy > 0 ? i.damage.energy.toFixed(2) : '—', false],
      ['Distortion', i => i.damage?.distortion > 0 ? i.damage.distortion.toFixed(2) : '—', false],
      ['Speed', i => i.projectileSpeed > 0 ? i.projectileSpeed.toFixed(0)+' m/s' : '—', false],
      ['Range', i => i.range > 0 ? (i.range/1000).toFixed(1)+' km' : '—', false, v => parseFloat(v)||0, true],
      ['Power Draw', i => i.powerDraw > 0 ? i.powerDraw.toFixed(2) : '—', false, v => parseFloat(v)||0, false],
    ],
    'Shield': [
      ['HP', i => i.hp > 0 ? i.hp.toFixed(0) : '—', false, v => parseFloat(v)||0, true],
      ['Regen Rate', i => i.regenRate > 0 ? i.regenRate.toFixed(0)+'/s' : '—', false, v => parseFloat(v)||0, true],
      ['Damaged Delay', i => i.damagedRegenDelay > 0 ? i.damagedRegenDelay.toFixed(2)+'s' : '—', false, v => parseFloat(v)||0, false],
      ['Downed Delay', i => i.downedRegenDelay > 0 ? i.downedRegenDelay.toFixed(2)+'s' : '—', false, v => parseFloat(v)||0, false],
    ],
    'PowerPlant': [
      ['Power Output', i => i.powerOutput > 0 ? i.powerOutput+' segs' : '—', false, v => parseFloat(v)||0, true],
      ['EM Signature', i => i.emSignature > 0 ? i.emSignature.toFixed(0) : '—', false, v => parseFloat(v)||0, false],
    ],
    'Cooler': [
      ['Cooling Rate', i => i.coolingRate > 0 ? i.coolingRate.toFixed(0) : '—', false, v => parseFloat(v)||0, true],
      ['IR Signature', i => i.irSignature > 0 ? i.irSignature.toFixed(0) : '—', false, v => parseFloat(v)||0, false],
    ],
    'QuantumDrive': [
      ['Speed', i => i.speed > 0 ? (i.speed/1e6).toFixed(0)+' Mm/s' : '—', false, v => parseFloat(v)||0, true],
      ['Cal Time', i => i.calTime > 0 ? i.calTime.toFixed(1)+'s' : '—', false, v => parseFloat(v)||0, false],
    ],
  };

  const specificRows = typeRows[primaryType] || [];
  const allRows = [...commonRows, ...specificRows];

  const table = document.getElementById('compare-table');
  const cols = [null, ...allItems];

  table.innerHTML = `
    <thead>
      <tr>
        <th>Stat</th>
        ${allItems.map(item => item
          ? `<th class="item-col">${item ? item.name : '—'}</th>`
          : '<th>—</th>'
        ).join('')}
      </tr>
    </thead>
    <tbody>
      ${allRows.map(([label, fn, highlight, numFn, higherBetter]) => {
        const values = allItems.map(item => item ? fn(item) : '—');
        let bestIdx = -1;

        if (numFn && allItems.some(Boolean)) {
          const nums = values.map(v => v === '—' ? (higherBetter ? -Infinity : Infinity) : numFn(v));
          const best = higherBetter ? Math.max(...nums) : Math.min(...nums);
          if (best !== -Infinity && best !== Infinity) {
            bestIdx = nums.indexOf(best);
          }
        }

        return `
          <tr>
            <td class="row-label">${label}</td>
            ${values.map((v, i) => `
              <td class="${v !== '—' && i === bestIdx ? 'best' : 'val'}">${v}</td>
            `).join('')}
          </tr>
        `;
      }).join('')}
    </tbody>
  `;
}

// ── Initial state ─────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Pre-populate compare selectors structure
  document.getElementById('compare-selectors').innerHTML = `
    <div style="color:var(--text3);font-family:'Share Tech Mono',monospace;font-size:11px;padding:8px">
      Load a data file to use the compare view
    </div>
  `;
});
</script>
</body>
</html>
