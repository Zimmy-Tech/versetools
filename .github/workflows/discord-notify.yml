name: Discord Update Notification

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Post to Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # Single-line summary only — the commit title becomes the
          # whole notification. The body-as-bulleted-description path
          # used to produce wall-of-text Discord posts on multi-section
          # commits; users prefer one-liners with a link out for detail.
          TITLE=$(git log -1 --pretty=%s)
          TITLE=$(printf '%s' "$TITLE" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read())[1:-1])')

          PAYLOAD=$(TITLE="$TITLE" python3 -c "
          import json, datetime, os
          embed = {
              'title': os.environ['TITLE'],
              'url': 'https://zimmy-tech.github.io/versetools/',
              'color': 5814783,
              'footer': {'text': 'VerseTools'},
              'timestamp': datetime.datetime.now(datetime.timezone.utc).isoformat().replace('+00:00', 'Z'),
          }
          print(json.dumps({'embeds': [embed]}))
          ")

          curl -sf -H "Content-Type: application/json" -d "$PAYLOAD" "$WEBHOOK_URL"
