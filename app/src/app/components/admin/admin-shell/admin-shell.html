<div class="admin-shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-title">ADMIN</div>
      <div class="brand-user">{{ admin.username() }}</div>
    </div>

    <div class="mode-switch" [class.ptu]="admin.mode() === 'ptu'">
      <div class="mode-label">Editing</div>
      <div class="mode-buttons">
        <button
          type="button"
          [class.active]="admin.mode() === 'live'"
          (click)="setMode('live')"
        >LIVE</button>
        <button
          type="button"
          [class.active]="admin.mode() === 'ptu'"
          (click)="setMode('ptu')"
        >PTU</button>
      </div>
      <button
        type="button"
        class="sync-btn"
        (click)="runSync()"
        [disabled]="syncing()"
        title="Replace PTU with current LIVE — use after a patch ships"
      >
        {{ syncing() ? 'Syncing…' : 'Sync PTU = LIVE' }}
      </button>
      @if (syncResult()) { <div class="sync-msg success">{{ syncResult() }}</div> }
      @if (syncError()) { <div class="sync-msg error">{{ syncError() }}</div> }
    </div>

    <nav>
      <a routerLink="/admin" [routerLinkActiveOptions]="{ exact: true }" routerLinkActive="active">
        Dashboard
      </a>
      <a routerLink="/admin/ships" routerLinkActive="active">
        Ships
      </a>
      <a routerLink="/admin/ship-accel" routerLinkActive="active">
        Ship Acceleration
      </a>
      <a routerLink="/admin/hardpoints" routerLinkActive="active">
        Hardpoints &amp; Loadout
      </a>
      <a routerLink="/admin/items" routerLinkActive="active">
        Items
      </a>
      <a routerLink="/admin/diff" routerLinkActive="active">
        Diff &amp; Import
      </a>
      <a routerLink="/admin/audit" routerLinkActive="active">
        Audit Log
      </a>
    </nav>
    <div class="sidebar-footer">
      <button (click)="admin.logout()">Sign out</button>
    </div>
  </aside>
  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
