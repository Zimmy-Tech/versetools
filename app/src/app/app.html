<div class="app-shell">
  <app-header [activeTab]="activeTab()" (tabChange)="activeTab.set($event)" />

  <div class="main">
    <div class="content">
      @switch (activeTab()) {
        @case ('loadout')    { <app-loadout-view /> }
        @case ('components') { <app-components-view /> }
        @case ('compare')    { <app-compare-view /> }
        @case ('finder')     { <app-component-finder /> }
        @case ('cart')        { <app-cart-view /> }
        @case ('missions')   { <app-missions-view /> }
        @case ('crafting')   { <app-crafting-view /> }
        @case ('rankings')  { <app-rankings-view /> }
        @case ('armor')     { <app-armor-view /> }
        @case ('submit')    { <app-submit-view /> }
        @case ('changelog') { <app-changelog-view /> }
      }
    </div>
  </div>
</div>
